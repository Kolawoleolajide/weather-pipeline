name: Weather Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ignore Node.js warning
  DB_URL: ${{ secrets.DB_URL }}              # your Supabase connection string

on:
  schedule:
    - cron: "*/30 * * * *"  # runs every hour
  workflow_dispatch:      # allows manual run

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests psycopg2-binary

      - name: Run weather pipeline
        run: python weather_pipeline.py
